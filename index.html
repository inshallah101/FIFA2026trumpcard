<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIFA 2026 Trump Card</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&amp;display=swap');
        
        body { font-family: system-ui, -apple-system, sans-serif; }
        .retro { font-family: "Press Start 2P", system-ui; image-rendering: pixelated; }
        
        .influence-bar { transition: width 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .qte-bar { transition: left 0.035s linear; }
        .event-log { scrollbar-width: thin; scrollbar-color: #64748b #1e2937; max-height: 180px; }
        
        .action-btn {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .action-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
        }
        .action-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-200">
    <div class="max-w-4xl mx-auto p-4">
        <!-- Header -->
        <div class="text-center mb-6">
            <h1 class="text-5xl font-black tracking-tighter retro text-red-500">FIFA 2026 TRUMP CARD</h1>
            <p class="text-slate-300 max-w-xl mx-auto mt-2 text-sm">Use your political influence for the greater good, and uphold the rightful champions of FIFA 2026. Make FIFA Great again!</p>
        </div>

        <div class="flex items-center justify-center mb-4">
            <div class="text-right">
                <div class="text-xs text-slate-400">BELGIUM KICKOFF IN</div>
                <div id="timer" class="text-5xl font-black tabular-nums text-white">60</div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-4">
            
            <!-- Left Panel: Visual -->
            <div class="lg:col-span-5 bg-slate-900 rounded-2xl p-5 border border-slate-700">
                <img src="Wf08a.jpg" alt="Trump on the hotline with Infantino" 
                     class="w-full rounded-xl border border-slate-600 mb-4">
                
                <div class="bg-slate-950 rounded-lg p-3 text-xs">
                    <div class="flex justify-between items-center mb-1">
                        <span class="text-slate-400">Balogun Status</span>
                        <span id="status-badge" 
                              class="px-2 py-0.5 bg-red-600 text-white text-[10px] rounded font-bold">SUSPENDED</span>
                    </div>
                    <img src="LWmAP.jpg" alt="Folarin Balogun with red card" 
                         class="w-full rounded-lg mt-2 border border-slate-700">
                </div>
            </div>

            <!-- Right Panel: Game Area -->
            <div class="lg:col-span-7 bg-slate-900 rounded-2xl p-5 border border-slate-700 flex flex-col">
                <!-- Influence -->
                <div class="flex items-center justify-between mb-3">
                    <div>
                        <div class="text-xs text-slate-400">INFLUENCE ON FIFA</div>
                        <div class="flex items-baseline gap-2">
                            <span id="influence" class="text-6xl font-black tabular-nums">12</span>
                            <span class="text-2xl text-slate-400">/ 100</span>
                        </div>
                    </div>
                </div>
                
                <div class="h-4 bg-slate-800 rounded-full overflow-hidden mb-5 border border-slate-700">
                    <div id="influence-bar" 
                         class="h-full bg-gradient-to-r from-red-500 via-orange-500 to-yellow-400 influence-bar"
                         style="width: 12%"></div>
                </div>

                <!-- Action Buttons -->
                <div class="grid grid-cols-1 sm:grid-cols-3 gap-3 mb-6">
                    <button onclick="startSwingingQTE('truth')"
                            class="action-btn group flex flex-col items-center justify-center gap-2 bg-slate-800 hover:bg-slate-700 border border-slate-600 hover:border-red-400 p-4 rounded-2xl">
                        <i class="fa-brands fa-x-twitter text-3xl text-red-400"></i>
                        <div class="text-center">
                            <div class="font-bold">Truth Social Blast</div>
                            <div class="text-[10px] text-emerald-400">Easy • Low Reward</div>
                        </div>
                    </button>
                    
                    <button id="donor-btn" onclick="startSwingingQTE('donor')"
                            class="action-btn group flex flex-col items-center justify-center gap-2 bg-slate-800 hover:bg-slate-700 border border-slate-600 hover:border-yellow-400 p-4 rounded-2xl">
                        <i class="fa-solid fa-handshake text-3xl text-yellow-400"></i>
                        <div class="text-center">
                            <div id="donor-label" class="font-bold">Major Donor Pressure</div>
                            <div class="text-[10px] text-emerald-400">Medium Difficulty</div>
                        </div>
                    </button>
                    
                    <button onclick="startSwingingQTE('hotline')"
                            class="action-btn group flex flex-col items-center justify-center gap-2 bg-red-600 hover:bg-red-500 border border-red-400 p-4 rounded-2xl text-white">
                        <i class="fa-solid fa-phone text-3xl"></i>
                        <div class="text-center">
                            <div class="font-bold">HOTLINE TO INFANTINO</div>
                            <div class="text-[10px] opacity-90">Hard • High Reward</div>
                        </div>
                    </button>
                </div>

                <!-- Secure Comms Log -->
                <div class="flex-1 flex flex-col">
                    <div class="flex items-center gap-2 mb-2 px-1">
                        <i class="fa-solid fa-scroll text-slate-400"></i>
                        <span class="text-xs font-bold tracking-widest text-slate-400">SECURE COMMS LOG</span>
                    </div>
                    <div id="event-log" 
                         class="event-log flex-1 overflow-y-auto text-xs font-mono bg-slate-950 rounded-lg p-3 space-y-1 border border-slate-800">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Audio elements -->
    <audio id="win-audio" src="win.mp3" preload="auto"></audio>

    <!-- QTE Modal -->
    <div id="qte-modal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-[60]">
        <div class="bg-slate-900 border border-red-500/50 rounded-3xl p-8 max-w-md w-full mx-4">
            <div class="text-center mb-6">
                <div id="
